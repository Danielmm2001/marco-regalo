<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invitación de Comunión</title>
  <meta name="description" content="Sobre animado para invitación de comunión" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink-bg:#fbe6e8; --pink-soft:#f8d9dc; --pink-line:#eab8bf;
      --paper:#fff8f6; --paper-2:#ffeef0; --accent:#cb7a8b; --text:#6e4a52;
    }
    html, body { width: 100%; min-height: 100%; }
    body {
      font-family: 'Montserrat', sans-serif;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 10% 8%, rgba(255,255,255,.45), transparent 36%),
        radial-gradient(circle at 90% 90%, rgba(255,255,255,.5), transparent 30%),
        var(--pink-bg);
    }
    body::before {
      content: "✧   ✝   ✧     🕊   ✧     ✝   ✧\A\A  ✧     🙏     ✧      ✝    ✧\A\A ✧   ✝    ✧   🕊    ✧   ✝   ✧";
      white-space: pre;
      position: fixed; inset: 0;
      color: var(--pink-line);
      font-size: clamp(22px, 2vw, 30px);
      line-height: 2.5;
      letter-spacing: .5rem;
      opacity: .35;
      pointer-events: none;
      text-align: center;
      padding-top: 4vh;
    }

    .scene { position: relative; z-index: 2; text-align: center; }
    .title {
      font-family: 'Great Vibes', cursive;
      color: #ba6d7f;
      font-size: clamp(2rem, 5vw, 3.2rem);
      margin-bottom: 1.5rem;
      text-shadow: 0 8px 24px rgba(186,109,127,.2);
    }
    .envelope-wrap { perspective: 1000px; cursor: pointer; }
    .envelope {
      width: min(360px, 90vw); height: 245px; position: relative;
      filter: drop-shadow(0 14px 32px rgba(155,86,102,.25));
    }
    .back {
      position: absolute; inset: 0;
      background: linear-gradient(150deg, #fce8e2, #f8d6ce);
      border-radius: 10px;
      border: 1px solid rgba(203,122,139,.3);
    }
    .front::before, .front::after {
      content: ""; position: absolute; bottom: 0; width: 0; height: 0;
      border-top: 245px solid transparent;
    }
    .front::before { left: 0; border-left: 180px solid rgba(220,170,161,.35); }
    .front::after { right: 0; border-right: 180px solid rgba(220,170,161,.35); }
    .flap {
      position: absolute; inset: 0 auto auto 0;
      width: 0; height: 0;
      border-left: 180px solid transparent;
      border-right: 180px solid transparent;
      border-top: 130px solid #f2c9c2;
      transform-origin: top center;
      transition: transform .9s ease;
      z-index: 4;
    }
    .letter {
      position: absolute; left: 50%; bottom: 14px; transform: translateX(-50%);
      width: calc(100% - 28px);
      background: linear-gradient(145deg, var(--paper), var(--paper-2));
      border-radius: 10px;
      border: 1px solid rgba(203,122,139,.25);
      padding: 24px 20px;
      color: var(--text);
      opacity: 0;
      z-index: 2;
      transition: transform 1s ease .35s, opacity .45s ease .35s;
    }
    .letter h2 { font-family: 'Playfair Display', serif; color: #b56578; margin-bottom: .6rem; font-size: 1.35rem; }
    .letter p { line-height: 1.7; font-size: .93rem; }
    .seal {
      position: absolute; top: -56px; left: 50%; transform: translateX(-50%);
      width: 44px; height: 44px; border-radius: 50%; background: #cf7b8d;
      display: grid; place-items: center; color: white; z-index: 5;
      box-shadow: 0 4px 14px rgba(166,78,100,.35);
      transition: opacity .4s;
    }

    .hint { margin-top: 14px; color: #b57a88; font-size: .95rem; }
    .opened .flap { transform: rotateX(-180deg); }
    .opened .letter { opacity: 1; transform: translateX(-50%) translateY(-145px); }
    .opened .seal { opacity: 0; }

    #musicBtn {
      position: fixed; right: 20px; bottom: 20px; border: 0; border-radius: 50%;
      width: 48px; height: 48px; background: rgba(255,255,255,.55); color: #b56578;
      font-size: 1.2rem; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,.12);
    }
  </style>
</head>
<body>
  <div class="scene">
    <h1 class="title">Mi Primera Comunión</h1>

    <div class="envelope-wrap" id="envelope" role="button" aria-label="Abrir sobre">
      <div class="envelope">
        <div class="back"></div>
        <div class="front"></div>
        <div class="letter">
          <h2>Un mensajito para ti 🤍</h2>
          <p>
            Gracias por acompañarme en este día tan especial.<br>
            Espero que compartamos juntos una celebración llena de amor,
            alegría y bendiciones.<br><br>
            <strong>(Mensaje de ejemplo, lo cambiamos cuando quieras)</strong>
          </p>
        </div>
        <div class="flap"><div class="seal">✉️</div></div>
      </div>
    </div>
    <p class="hint">Haz click en el sobre para abrirlo</p>
  </div>

  <audio id="bgMusic" loop preload="auto">
    <!-- Reemplaza por tu canción cuando la tengas -->
    <source src="" type="audio/mpeg" />
  </audio>
  <button id="musicBtn" title="Música">🔇</button>

  <script>
    const envelope = document.getElementById('envelope');
    const music = document.getElementById('bgMusic');
    const btn = document.getElementById('musicBtn');
    let opened = false;

    envelope.addEventListener('click', () => {
      if (opened) return;
      opened = true;
      envelope.classList.add('opened');
      if (music.querySelector('source').src) {
        music.volume = 0.7;
        music.play().catch(() => {});
        btn.textContent = '🎵';
      }
    });

    btn.addEventListener('click', () => {
      if (!music.querySelector('source').src) return;
      if (music.paused) { music.play(); btn.textContent = '🎵'; }
      else { music.pause(); btn.textContent = '🔇'; }
    });
  </script>
</body>
</html>
